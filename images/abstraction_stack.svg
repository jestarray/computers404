<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: white; font-family: Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <text x="400" y="550" font-size="20" font-weight="bold" text-anchor="middle" fill="black">Layers of Abstraction</text>

  <line x1="100" y1="50" x2="100" y2="500" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <text x="-275" y="90" font-size="16" font-weight="bold" fill="black" transform="rotate(-90)" text-anchor="middle">Increasing order of Complexity</text>

  <line x1="150" y1="500" x2="150" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <text x="-275" y="140" font-size="16" font-weight="bold" fill="black" transform="rotate(-90)" text-anchor="middle">Increasing order of Abstraction</text>

  <g transform="translate(180, 0)">
    <rect x="0" y="40" width="440" height="40" rx="8" fill="#c00000" stroke="#a00000" stroke-width="1"/>
    <text x="220" y="66" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Application</text>

    <rect x="0" y="85" width="440" height="40" rx="8" fill="#ff0000" stroke="#cc0000" stroke-width="1"/>
    <text x="220" y="111" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Algorithm</text>

    <rect x="0" y="130" width="440" height="40" rx="8" fill="#ffc000" stroke="#cca000" stroke-width="1"/>
    <text x="220" y="156" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Programming Language</text>

    <rect x="0" y="175" width="440" height="40" rx="8" fill="#ffff00" stroke="#cccc00" stroke-width="1"/>
    <text x="220" y="201" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Assembly Language</text>

    <rect x="0" y="220" width="440" height="40" rx="8" fill="#92d050" stroke="#70a030" stroke-width="1"/>
    <text x="220" y="246" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Machine Code</text>

    <rect x="0" y="265" width="440" height="40" rx="8" fill="#00b050" stroke="#008030" stroke-width="1"/>
    <text x="220" y="291" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Instruction Set Architecture</text>

    <rect x="0" y="310" width="440" height="40" rx="8" fill="#00b0f0" stroke="#0080c0" stroke-width="1"/>
    <text x="220" y="336" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Micro Architecture</text>

    <rect x="0" y="355" width="440" height="40" rx="8" fill="#2070c0" stroke="#105090" stroke-width="1"/>
    <text x="220" y="381" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Gates/Registers</text>

    <rect x="0" y="400" width="440" height="40" rx="8" fill="#002060" stroke="#001040" stroke-width="1"/>
    <text x="220" y="426" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Devices (Transistors)</text>

    <rect x="0" y="445" width="440" height="40" rx="8" fill="#7030a0" stroke="#502080" stroke-width="1"/>
    <text x="220" y="471" font-size="16" font-weight="bold" fill="black" text-anchor="middle">Physics</text>
  </g>

  <line x1="620" y1="285" x2="720" y2="285" stroke="black" stroke-width="1" />

  <line x1="655" y1="285" x2="655" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="-167" y="645" font-size="18" font-weight="bold" fill="black" transform="rotate(-90)" text-anchor="middle">Software</text>

  <line x1="655" y1="285" x2="655" y2="485" stroke="black" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="-385" y="645" font-size="18" font-weight="bold" fill="black" transform="rotate(-90)" text-anchor="middle">Hardware</text>

</svg>
