<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 100"
     width="200"
     height="100"
     font-family="sans-serif">

  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Input A wire -->
  <line x1="15" y1="30" x2="60" y2="30"
        stroke="black"
        stroke-width="2.5">
    <animate attributeName="stroke"
             values="black;black;red;red;black"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </line>

  <!-- Input B wire -->
  <line x1="15" y1="70" x2="60" y2="70"
        stroke="black"
        stroke-width="2.5">
    <animate attributeName="stroke"
             values="black;red;black;red;black"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </line>

  <!-- AND gate -->
  <path d="M60 15
           L80 15
           A35 35 0 0 1 80 85
           L60 85
           Z"
        fill="none"
        stroke="black"
        stroke-width="2.5"/>

  <!-- Output wire -->
  <line x1="115" y1="50" x2="145" y2="50"
        stroke="black"
        stroke-width="2.5">
    <animate attributeName="stroke"
             values="black;black;black;red;black"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </line>

  <!-- Output lamp -->
  <circle cx="165"
          cy="50"
          r="10"
          stroke="black"
          stroke-width="2.5"
          fill="white">
    <animate attributeName="fill"
             values="white;white;white;gold;white"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </circle>

  <!-- Labels -->
  <text x="5" y="34" font-size="12">A</text>
  <text x="5" y="74" font-size="12">B</text>

  <!-- Input A value -->
  <text x="28" y="24" font-size="12">
    <animate attributeName="textContent"
             values="0;0;1;1;0"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </text>

  <!-- Input B value -->
  <text x="28" y="64" font-size="12">
    <animate attributeName="textContent"
             values="0;1;0;1;0"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </text>

  <!-- Output value -->
  <text x="180" y="54" font-size="12">
    <animate attributeName="textContent"
             values="0;0;0;1;0"
             dur="8s"
             repeatCount="indefinite"
             keyTimes="0;0.25;0.5;0.75;1"/>
  </text>

</svg>
